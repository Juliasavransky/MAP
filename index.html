tileCarto.addTo(map);

function toggleTransit() {
  transitMode = !transitMode;
  const btn = document.getElementById('btn-tr');
  if (transitMode) {
    map.removeLayer(tileCarto); tileOSM.addTo(map);
    btn.classList.add('on'); btn.textContent = '🗺️ מפה רגילה';
  } else {
    map.removeLayer(tileOSM); tileCarto.addTo(map);
    btn.classList.remove('on'); btn.textContent = '🚇 תחבורה ציבורית';
  }
}

const COLORS = { a: '#3a7bd5', f: '#e07b39', s: '#27ae60', h: '#c0392b', v: '#9b59b6', ky: '#16a085', pg: '#e67e22' };
const EMOJIS  = { a: '🎡',     f: '🍽️',    s: '🛍️',    h: '🏨',    v: '♻️',    ky: '🧸',    pg: '🛝'    };

function mkIcon(type) {
  const c = COLORS[type], e = EMOJIS[type];
  return L.divIcon({
    html: `<div style="width:38px;height:38px;border-radius:50%;background:${c};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:18px">${e}</div>`,
    iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-40], className:''
  });
}

const layers = { a: L.layerGroup(), f: L.layerGroup(), s: L.layerGroup(), h: L.layerGroup(), v: L.layerGroup(), ky: L.layerGroup(), pg: L.layerGroup() };
const active  = { a: true, f: true, s: true, h: true, v: true, ky: true, pg: true };
const markersByName = {};   // name -> marker, populated by add() — used by day-plan mode
const stationsByName = {};  // name -> station marker, populated by mkSt()
let dayMode = null;         // currently-selected day id, or null = normal category-filter mode
let dayMarkersByType = {};  // in day-mode: { 'a': [m, m], 'f': [...], ... } for per-type toggling

function toggle(t) {
  active[t] = !active[t];
  const btn = document.getElementById('btn-'+t);
  btn.classList.toggle('on', active[t]);

  if (dayMode) {
    // In day-mode: show/hide only this day's markers of this type
    (dayMarkersByType[t] || []).forEach(m => {
      if (active[t]) dayMarkerLayer.addLayer(m);
      else           dayMarkerLayer.removeLayer(m);
    });
  } else {
    if (active[t]) layers[t].addTo(map); else map.removeLayer(layers[t]);
    if (typeof refreshRoutes === 'function') refreshRoutes();
  }
}

function add(type, lat, lng, name, tagLabel, desc, price, tip, hours, reservation) {
  const m = L.marker([lat, lng], { icon: mkIcon(type) });
  m._catType = type;
  const priceHtml = price ? `<div class="price">💰 ${price}</div>` : '';
  const hoursHtml = hours ? `<div class="hours">🕐 ${hours}</div>` : '';
  let resHtml = '';
  if      (reservation === 'required')    resHtml = `<div class="res res-r">⚠️ חובה להזמין מראש!</div>`;
  else if (reservation === 'recommended') resHtml = `<div class="res res-m">👍 מומלץ להזמין מראש</div>`;
  else if (reservation === 'no')          resHtml = `<div class="res res-n">✅ ניתן להגיע ללא הזמנה</div>`;
  const siteUrl = WEBSITE_URLS[name] || '';
  const urlHtml = siteUrl ? `<div class="website"><a href="${siteUrl}" target="_blank" rel="noopener">🌐 לאתר הרשמי ↗</a></div>` : '';
  const transitNote = TRANSIT_NOTES[name] || '';
  const transitHtml = transitNote ? `<div class="transit">${transitNote}</div>` : '';
  const tipHtml = tip ? `<div class="tip">💡 ${tip}</div>` : '';
  m.bindPopup(
    `<div class="pi"><h3>${name}</h3><span class="tag" style="background:${COLORS[type]}">${tagLabel}</span><p>${desc}</p>${priceHtml}${hoursHtml}${resHtml}${transitHtml}${urlHtml}${tipHtml}</div>`,
    { maxWidth: 310 }
  );
  layers[type].addLayer(m);
  markersByName[name] = m;
}

/* ─── TRANSIT STATIONS & ROUTES ─── */
const stLayer = L.layerGroup();
let stActive = false, rtActive = false;
let allRoutes = []; // { line, cats: [type1, type2] } — visible only when rtActive AND every cat in cats is active

function toggleStations() {
  if (dayMode) return;
  stActive = !stActive;
  const btn = document.getElementById('btn-st');
  if (stActive) { stLayer.addTo(map); btn.classList.add('on'); }
  else { map.removeLayer(stLayer); btn.classList.remove('on'); }
}
function toggleRoutes() {
  if (dayMode) return;
  rtActive = !rtActive;
  const btn = document.getElementById('btn-rt');
  if (rtActive) btn.classList.add('on'); else btn.classList.remove('on');
  refreshRoutes();
}

// Show/hide each route line based on: routes-toggle ON + every category it connects is currently active
function refreshRoutes() {
  allRoutes.forEach(({ line, cats }) => {
    const shouldShow = rtActive && cats.every(c => active[c]);
    const onMap = map.hasLayer(line);
    if (shouldShow && !onMap) line.addTo(map);
    else if (!shouldShow && onMap) map.removeLayer(line);
  });
}

// Station marker helper
function mkSt(lat, lng, name, lines, color, note) {
  const icon = L.divIcon({
    html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:bold">⬤</div>`,
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16], className:''
  });
  const m = L.marker([lat,lng], { icon, zIndexOffset: -100 });
  m.bindPopup(`<div class="pi"><h3>🚇 ${name}</h3><span class="tag" style="background:${color}">${lines}</span><p style="margin-top:6px;line-height:1.7">${note}</p></div>`, { maxWidth:270 });
  stLayer.addLayer(m);
  stationsByName[name] = m;
}

// Transit line helper. cats = the marker-categories this route connects (e.g. ['h','a']) —
// the route only shows once routes-toggle is on AND every one of those categories is active.
function mkRoute(coords, color, weight, dash, popup, cats) {
  const opts = { color, weight, opacity: 0.82, smoothFactor: 1.5, lineJoin: 'round' };
  if (dash) opts.dashArray = dash;
  const line = L.polyline(coords, opts);
  if (popup) line.bindTooltip(popup, { sticky: true, direction: 'top', opacity: 0.97, className: 'route-tooltip' });
  allRoutes.push({ line, cats: cats || ['h','a'] });
}

// Food route helper (attraction→nearby food/shopping, thinner orange dashed)
function mkFood(coords, popup, cats) {
  const line = L.polyline(coords, { color:'#e07b39', weight:3, opacity:0.65, dashArray:'8,5' });
  if (popup) line.bindTooltip(`🍽️ ${popup}`, { sticky: true, direction: 'top', opacity: 0.97, className: 'route-tooltip' });
  allRoutes.push({ line, cats: cats || ['a','f'] });
}

// Straight-line distance in km — used to find food/shopping near a day's stops
function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b[0]-a[0]) * Math.PI/180;
  const dLng = (b[1]-a[1]) * Math.PI/180;
  const lat1 = a[0]*Math.PI/180, lat2 = b[0]*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
const NEARBY_RADIUS_KM = 1.3; // ~15-16 min walk — how close food/shopping needs to be to a day's stops to show up

function mkDaySeg(coords, color, weight, dash, popup) {
  const opts = { color, weight, opacity: 0.85, smoothFactor: 1.5, lineJoin: 'round' };
  if (dash) opts.dashArray = dash;
  const line = L.polyline(coords, opts);
  if (popup) line.bindTooltip(popup, { sticky: true, direction: 'top', opacity: 0.97, className: 'route-tooltip' });
  return line;
}

const dayMarkerLayer = L.layerGroup();
const dayRouteLayer  = L.layerGroup();

function setFiltersEnabled(enabled) {
  ['a','f','s','v','ky','pg','h','rt','st'].forEach(t => {
    const btn = document.getElementById('btn-'+t);
    if (btn) btn.classList.toggle('disabled', !enabled);
  });
}

function selectDay(id) {
  dayMarkerLayer.clearLayers();
  dayRouteLayer.clearLayers();
  if (map.hasLayer(dayMarkerLayer)) map.removeLayer(dayMarkerLayer);
  if (map.hasLayer(dayRouteLayer))  map.removeLayer(dayRouteLayer);
  const sel = document.getElementById('day-select');

  if (!id) {
    dayMode = null;
    sel.classList.remove('on');
    setFiltersEnabled(true);
    Object.keys(layers).forEach(k => { if (active[k]) layers[k].addTo(map); });
    if (stActive) stLayer.addTo(map);
    refreshRoutes();
    return;
  }

  dayMode = id;
  sel.classList.add('on');
  dayMarkersByType = {};

  // Keep category filter buttons active; disable only route/transit overlays
  ['rt','st'].forEach(t => {
    const btn = document.getElementById('btn-'+t);
    if (btn) btn.classList.add('disabled');
  });
  ['a','f','s','v','ky','pg','h'].forEach(t => {
    const btn = document.getElementById('btn-'+t);
    if (btn) btn.classList.remove('disabled');
  });

  // hide every "show all" layer — day mode shows only this day's own selection
  Object.values(layers).forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  if (map.hasLayer(stLayer)) map.removeLayer(stLayer);
  allRoutes.forEach(({ line }) => { if (map.hasLayer(line)) map.removeLayer(line); });

  const plan = DAY_PLANS[id];
  const bounds = [];
  const addedMarkers = new Set();

  // Helper: register a typed marker into dayMarkersByType and conditionally add to layer
  function registerDayMarker(m, t) {
    if (!dayMarkersByType[t]) dayMarkersByType[t] = [];
    dayMarkersByType[t].push(m);
    if (active[t]) dayMarkerLayer.addLayer(m);
  }

  (plan.stops || []).forEach(name => {
    const m = markersByName[name];
    if (m) {
      const t = m._catType || 'a';
      registerDayMarker(m, t);
      bounds.push(m.getLatLng());
      addedMarkers.add(m);
    }
  });
  (plan.stations || []).forEach(name => {
    const m = stationsByName[name];
    if (m) { dayMarkerLayer.addLayer(m); bounds.push(m.getLatLng()); }
  });
  (plan.extra || []).forEach(ex => {
    const icon = L.divIcon({
      html: `<div style="width:30px;height:30px;border-radius:50%;background:#1a1a2e;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;font-size:14px">${ex.icon || '📍'}</div>`,
      iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-18], className:''
    });
    const m = L.marker(ex.coords, { icon });
    m.bindPopup(`<div class="pi"><h3>${ex.icon||''} ${ex.label}</h3><p>${ex.note||''}</p></div>`, { maxWidth:260 });
    dayMarkerLayer.addLayer(m);
    bounds.push(ex.coords);
  });

  // Show ALL nearby category markers (a, f, s, v, ky, pg) within proximity of today's stops
  const anchors = (plan.stops || [])
    .filter(name => name !== '🏨 Adina Apartment Hotel Copenhagen' && markersByName[name])
    .map(name => { const ll = markersByName[name].getLatLng(); return [ll.lat, ll.lng]; });
  if (anchors.length) {
    ['a','f','s','v','ky','pg'].forEach(cat => {
      layers[cat].eachLayer(m => {
        if (addedMarkers.has(m)) return;
        const ll = m.getLatLng();
        const isNearby = anchors.some(a => haversineKm(a, [ll.lat, ll.lng]) <= NEARBY_RADIUS_KM);
        if (isNearby) {
          registerDayMarker(m, cat);
          addedMarkers.add(m);
          bounds.push(ll);
        }
      });
    });
  }

  (plan.segs || []).forEach(s => {
    dayRouteLayer.addLayer(mkDaySeg(s.coords, s.color, s.weight, s.dash, s.label));
  });

  dayMarkerLayer.addTo(map);
  dayRouteLayer.addTo(map);
  if (bounds.length) map.fitBounds(bounds, { padding: [40,40] });
}

Object.values(layers).forEach(l => l.addTo(map));
