const map = L.map('map', { zoomControl: true }).setView([55.682, 12.566], 13);

const tileCarto = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
});
const tileOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors', maxZoom: 19
});
let transitMode = false;
tileCarto.addTo(map);

function toggleTransit() {
  transitMode = !transitMode;
  const btn = document.getElementById('btn-tr');
  if (transitMode) {
    map.removeLayer(tileCarto); tileOSM.addTo(map);
    btn.classList.add('on'); btn.textContent = '🗺️ מפה רגילה';
  } else {
    map.removeLayer(tileOSM); tileCarto.addTo(map);
    btn.classList.remove('on'); btn.textContent = '🚇 תחבורה ציבורית';
  }
}

const COLORS = { a: '#3a7bd5', f: '#e07b39', s: '#27ae60', h: '#c0392b', v: '#9b59b6', ky: '#16a085' };
const EMOJIS  = { a: '🎡',     f: '🍽️',    s: '🛍️',    h: '🏨',    v: '♻️',    ky: '🧸'    };

function mkIcon(type) {
  const c = COLORS[type], e = EMOJIS[type];
  return L.divIcon({
    html: `<div style="width:38px;height:38px;border-radius:50%;background:${c};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:18px">${e}</div>`,
    iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-40], className:''
  });
}

const layers = { a: L.layerGroup(), f: L.layerGroup(), s: L.layerGroup(), h: L.layerGroup(), v: L.layerGroup(), ky: L.layerGroup() };
const active  = { a: true, f: true, s: true, h: true, v: true, ky: true };

function toggle(t) {
  active[t] = !active[t];
  const btn = document.getElementById('btn-'+t);
  if (active[t]) { layers[t].addTo(map); btn.classList.add('on'); }
  else           { map.removeLayer(layers[t]); btn.classList.remove('on'); }
}

function add(type, lat, lng, name, tagLabel, desc, price, tip, hours, reservation) {
  const m = L.marker([lat, lng], { icon: mkIcon(type) });
  const priceHtml = price ? `<div class="price">💰 ${price}</div>` : '';
  const hoursHtml = hours ? `<div class="hours">🕐 ${hours}</div>` : '';
  let resHtml = '';
  if      (reservation === 'required')    resHtml = `<div class="res res-r">⚠️ חובה להזמין מראש!</div>`;
  else if (reservation === 'recommended') resHtml = `<div class="res res-m">👍 מומלץ להזמין מראש</div>`;
  else if (reservation === 'no')          resHtml = `<div class="res res-n">✅ ניתן להגיע ללא הזמנה</div>`;
  const siteUrl = WEBSITE_URLS[name] || '';
  const urlHtml = siteUrl ? `<div class="website"><a href="${siteUrl}" target="_blank" rel="noopener">🌐 לאתר הרשמי ↗</a></div>` : '';
  const tipHtml = tip ? `<div class="tip">💡 ${tip}</div>` : '';
  m.bindPopup(
    `<div class="pi"><h3>${name}</h3><span class="tag" style="background:${COLORS[type]}">${tagLabel}</span><p>${desc}</p>${priceHtml}${hoursHtml}${resHtml}${urlHtml}${tipHtml}</div>`,
    { maxWidth: 310 }
  );
  layers[type].addLayer(m);
}

const stLayer = L.layerGroup();
const rtLayer = L.layerGroup();
let stActive = false, rtActive = false;

function toggleStations() {
  stActive = !stActive;
  const btn = document.getElementById('btn-st');
  if (stActive) { stLayer.addTo(map); btn.classList.add('on'); }
  else { map.removeLayer(stLayer); btn.classList.remove('on'); }
}
function toggleRoutes() {
  rtActive = !rtActive;
  const btn = document.getElementById('btn-rt');
  if (rtActive) { rtLayer.addTo(map); btn.classList.add('on'); }
  else { map.removeLayer(rtLayer); btn.classList.remove('on'); }
}

// Station marker helper
function mkSt(lat, lng, name, lines, color, note) {
  const icon = L.divIcon({
    html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:bold">⬤</div>`,
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16], className:''
  });
  const m = L.marker([lat,lng], { icon, zIndexOffset: -100 });
  m.bindPopup(`<div class="pi"><h3>🚇 ${name}</h3><span class="tag" style="background:${color}">${lines}</span><p style="margin-top:6px;line-height:1.7">${note}</p></div>`, { maxWidth:270 });
  stLayer.addLayer(m);
}

// Transit line helper (hotel→attraction routes)
function mkRoute(coords, color, weight, dash, popup) {
  const opts = { color, weight, opacity: 0.82, smoothFactor: 1.5, lineJoin: 'round' };
  if (dash) opts.dashArray = dash;
  const line = L.polyline(coords, opts);
  if (popup) line.bindPopup(`<div class="pi" style="min-width:220px"><p style="line-height:1.7">${popup}</p></div>`, { maxWidth:310 });
  rtLayer.addLayer(line);
}

// Food route helper (attraction→nearby food, thinner orange dashed)
function mkFood(coords, popup) {
  const line = L.polyline(coords, { color:'#e07b39', weight:3, opacity:0.65, dashArray:'8,5' });
  if (popup) line.bindPopup(`<div class="pi" style="min-width:200px"><p style="line-height:1.7">🍽️ ${popup}</p></div>`, { maxWidth:280 });
  rtLayer.addLayer(line);
}
