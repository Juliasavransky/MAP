<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f6fa; }
  #header { background: #1a1a2e; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 20px; margin: 0; }
  #header span { font-size: 13px; color: #aaa; }
  #controls { background: #fff; padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #ddd; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
  .filter-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; border: 2px solid; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.18s; user-select: none; background: #fff; }
  .filter-btn.a   { border-color: #3a7bd5; color: #3a7bd5; }
  .filter-btn.a.on  { background: #3a7bd5; color: white; }
  .filter-btn.f   { border-color: #e07b39; color: #e07b39; }
  .filter-btn.f.on  { background: #e07b39; color: white; }
  .filter-btn.s   { border-color: #27ae60; color: #27ae60; }
  .filter-btn.s.on  { background: #27ae60; color: white; }
  .filter-btn.k   { border-color: #8e44ad; color: #8e44ad; }
  .filter-btn.k.on  { background: #8e44ad; color: white; }
  .filter-btn.h   { border-color: #c0392b; color: #c0392b; }
  .filter-btn.h.on  { background: #c0392b; color: white; }
  .filter-btn.tr  { border-color: #2c3e50; color: #2c3e50; }
  .filter-btn.tr.on { background: #2c3e50; color: white; }
  #map { height: calc(100vh - 110px); }
  .pi { min-width: 240px; font-family: 'Segoe UI', Arial, sans-serif; direction: rtl; }
  .pi h3 { font-size: 15px; margin-bottom: 5px; color: #1a1a2e; }
  .pi .tag { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 10px; color: white; margin-bottom: 8px; }
  .pi p { font-size: 13px; color: #333; line-height: 1.55; }
  .pi .price { background: #f0f4ff; border-radius: 6px; padding: 5px 8px; margin-top: 7px; font-size: 12px; color: #2c3e50; }
  .pi .hours { background: #f7f7f7; border-radius: 6px; padding: 5px 8px; margin-top: 5px; font-size: 12px; color: #333; }
  .pi .res { border-radius: 6px; padding: 5px 8px; margin-top: 5px; font-size: 12px; font-weight: 700; }
  .pi .res-r { background: #ffe4e4; color: #c0392b; }
  .pi .res-m { background: #fff8e1; color: #856404; }
  .pi .res-n { background: #e8f5e9; color: #2e7d32; }
  .pi .tip { margin-top: 7px; font-size: 12px; color: #777; font-style: italic; border-top: 1px solid #eee; padding-top: 5px; }
  .legend { position: absolute; bottom: 28px; left: 12px; background: white; padding: 10px 14px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 1000; font-size: 13px; direction: rtl; }
  .legend div { display: flex; align-items: center; gap: 7px; margin: 4px 0; }
  .dot { width: 13px; height: 13px; border-radius: 50%; display: inline-block; }
</style>
</head>

<div id="header">

    <h1>🗺️ מפת קופנהגן — יולי 2026</h1>

<div id="controls">

  <div class="filter-btn s on" id="btn-s" onclick="toggle('s')">🟢 קניות</div>
  <div class="filter-btn k on" id="btn-k" onclick="toggle('k')">🟣 כשר</div>
  <div class="filter-btn h on" id="btn-h" onclick="toggle('h')">🔴 מלון</div>
  <div class="filter-btn tr" id="btn-tr" onclick="toggleTransit()">🚇 תחבורה ציבורית</div>
</div>
<div id="map"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map', { zoomControl: true }).setView([55.682, 12.566], 13);

const tileCarto = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
});
const tileOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors', maxZoom: 19
});
let transitMode = false;
tileCarto.addTo(map);

function toggleTransit() {
  transitMode = !transitMode;
  const btn = document.getElementById('btn-tr');
  if (transitMode) {
    map.removeLayer(tileCarto); tileOSM.addTo(map);
    btn.classList.add('on'); btn.textContent = '🗺️ מפה רגילה';
  } else {
    map.removeLayer(tileOSM); tileCarto.addTo(map);
    btn.classList.remove('on'); btn.textContent = '🚇 תחבורה ציבורית';
  }
}

const COLORS = { a: '#3a7bd5', f: '#e07b39', s: '#27ae60', k: '#8e44ad', h: '#c0392b' };
const EMOJIS  = { a: '🎡',     f: '🍽️',    s: '🛍️',    k: '✡️',    h: '🏨'    };

function mkIcon(type) {
  const c = COLORS[type], e = EMOJIS[type];
  return L.divIcon({
    html: `<div style="width:38px;height:38px;border-radius:50%;background:${c};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:18px">${e}</div>`,
    iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-40], className:''
  });
}

const layers = { a: L.layerGroup(), f: L.layerGroup(), s: L.layerGroup(), k: L.layerGroup(), h: L.layerGroup() };
const active  = { a: true, f: true, s: true, k: true, h: true };

function toggle(t) {
  active[t] = !active[t];
  const btn = document.getElementById('btn-'+t);
  if (active[t]) { layers[t].addTo(map); btn.classList.add('on'); }
  else           { map.removeLayer(layers[t]); btn.classList.remove('on'); }
}

function add(type, lat, lng, name, tagLabel, desc, price, tip, hours, reservation) {
  const m = L.marker([lat, lng], { icon: mkIcon(type) });
  const priceHtml = price ? `<div class="price">💰 ${price}</div>` : '';
  const hoursHtml = hours ? `<div class="hours">🕐 ${hours}</div>` : '';
  let resHtml = '';
  if      (reservation === 'required')    resHtml = `<div class="res res-r">⚠️ חובה להזמין מראש!</div>`;
  else if (reservation === 'recommended') resHtml = `<div class="res res-m">👍 מומלץ להזמין מראש</div>`;
  else if (reservation === 'no')          resHtml = `<div class="res res-n">✅ ניתן להגיע ללא הזמנה</div>`;
  const tipHtml = tip ? `<div class="tip">💡 ${tip}</div>` : '';
  m.bindPopup(
    `<div class="pi"><h3>${name}</h3><span class="tag" style="background:${COLORS[type]}">${tagLabel}</span><p>${desc}</p>${priceHtml}${hoursHtml}${resHtml}${tipHtml}</div>`,
    { maxWidth: 310 }
  );
  layers[type].addLayer(m);
}
